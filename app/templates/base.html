<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanPulse AI — Gujarat Urban Growth Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background: #f8f9fa; font-family: 'Segoe UI', system-ui, sans-serif; }
        .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); transition: transform .15s; }
        .card:hover { transform: translateY(-2px); }
        .stat-card { text-align: center; padding: 1.5rem; }
        .stat-card .number { font-size: 2rem; font-weight: 700; color: #0d6efd; }
        .stat-card .label { font-size: .85rem; color: #6c757d; text-transform: uppercase; letter-spacing: .5px; }
        .map-container { border-radius: 12px; overflow: hidden; }
        .map-container iframe { width: 100%; height: 550px; border: 0; }
        .cluster-badge { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; }
        footer { font-size: .85rem; color: #6c757d; text-align: center; padding: 2rem 0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-globe2 me-2"></i>UrbanPulse AI
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-map"></i> Map</a></li>
                    <li class="nav-item"><a class="nav-link" href="/predictions"><i class="bi bi-graph-up"></i> Predictions</a></li>
                    <li class="nav-item"><a class="nav-link" href="/clusters"><i class="bi bi-diagram-3"></i> Clusters</a></li>
                    <li class="nav-item"><a class="nav-link" href="/metrics"><i class="bi bi-bar-chart"></i> Metrics</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>
    <footer class="container">
        UrbanPulse AI — Built with Sentinel-2 + Google Earth Engine + ML
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
